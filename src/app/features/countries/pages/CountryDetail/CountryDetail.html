
<section class="min-h-screen bg-pegasus-dark p-6 md:p-12 flex flex-col gap-10">

  <!-- Botón Volver -->
  <button
    routerLink="/"
    class="flex items-center gap-2 text-pegasus-muted hover:text-pegasus-border transition-colors self-start font-bold uppercase tracking-widest text-xs">
    <span class="text-lg text-pegasus-border"> ← </span> Volver a la exploración
  </button>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">

    <!-- Columna Izquierda: Identidad del País (4 columnas) -->
    @if (selectCountry()) {
      <div class="lg:col-span-5 flex flex-col">
        <div class="relative mb-8">
          <h1 class="text-6xl md:text-8xl font-black text-pegasus-highlight tracking-tighter leading-none">
            {{ selectCountry()?.translations?.['spa']?.common }}
          </h1>
          <!-- Línea Pegasus -->
          <div class="h-2 w-32 bg-pegasus-border mt-4 rounded-full shadow-lg shadow-sky-500/20"></div>
        </div>

        <!-- Tarjeta de Información General -->
        <div class="bg-pegasus-card border border-pegasus-border p-8 rounded-3xl shadow-2xl">
          <country-info [country]="selectCountry()!" />
        </div>
      </div>
    }

    <!-- Columna Derecha: El "Hub" de Componentes (7 columnas) -->
    <div class="lg:col-span-7 flex flex-col gap-6">

      <!-- Slot para el Componente de Clima (Open-Meteo) -->
      <div class="bg-slate-900/50 border border-dashed border-pegasus-border p-6 rounded-3xl flex flex-col items-center justify-center min-h-[250px]">
        <weather-info
          [lat]="selectCountry()?.latlng?.[0] || 0"
          [lng]="selectCountry()?.latlng?.[1] || 0"
        />
      </div>

      <!-- Grid para futuros componentes (Moneda, Lugares, etc.) -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
         <div class="bg-pegasus-card/40 border border-pegasus-border p-6 rounded-2xl h-40 flex items-center justify-center">
            <span class="text-slate-600 text-xs font-bold uppercase tracking-widest italic text-center">
               Próximamente:<br>Conversor de Moneda
            </span>
         </div>
         <div class="bg-pegasus-card/40 border border-pegasus-border p-6 rounded-2xl h-40 flex items-center justify-center">
            <country-attractions [countrycode]="" />
         </div>
      </div>

    </div>
  </div>

</section>
