
<section class="min-h-screen bg-dark-bg p-10 font-orbitron">
  <button routerLink="" class="btn btn-outline text-neon-violet btn-neon-cyan mb-8">
    ← Volver al Explorador
  </button>


  <div class="min-h-screen bg-dark-bg p-10">

    @if (pais()) {
      <country-info [country]="pais()!" />
    } @else {
      <p class="text-neon-violet animate-pulse">Sincronizando con la base de datos de Nomadix...</p>
    }

  </div>


  <h1 class="text-neon-pink text-5xl animate-pulse">
    Espera mas información sobre tu viaje ...
    CARGANDO DATOS DEL SISTEMAp...
  </h1>

  <p class="text-neon-cyan mt-4 tracking-tighter">
    Fase 2: Conexión con satélites meteorológicos en progreso.
  </p>
</section>
